<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-Decoration</title>
    <style>
        .one{
            height: 323px;
            width: 143px;
            background-color: yellow;
            text-decoration: underline;
        }
        .two{
            height: 243px;
            width: 256px;
            background-color: springgreen;
            text-decoration: wavy underline;
        }
    </style>
</head>
<body>
    <p class="one">Lorem ipsum dolor sit amet consectetur adipisicing elit. Sit dolor exercitationem debitis ab! Minus dolore sequi excepturi odio odit, modi ex in non nobis, at consequatur! Delectus aperiam autem sint.</p>
    <p class="two">Lorem ipsum dolor sit amet consectetur adipisicing elit. Facilis, quos dicta! Perspiciatis.</p>
</body>
</html>
